# TiPToP Configuration for our DROID lab setup
# Generated by Claude; backup at tiptop.yml.bak

robot:
  type: fr3_robotiq
  dof: 7

  # NUC running our bamboo-polymetis shim
  host: "172.16.0.2"
  port: 5555
  gripper_port: 5559

  # Be CAUTIOUS — start at 0.2 (20% speed)
  time_dilation_factor: 0.2

  # DROID-default home/capture
  q_home: [0.0, -0.628, 0.0, -2.513, 0.0, 1.885, 0.0]
  q_capture: [-0.034, 0.090, 0.080, -1.319, -0.003, 1.253, 0.030]

cameras:
  # fps is kept at 15 (not 30) so three ZEDs fit the USB bandwidth budget — HD720@30 x3
  # triggers "LOW USB BANDWIDTH" on open. The LeRobot export resamples to 15 Hz and aligns
  # camera frames by hardware timestamp, so 15 fps capture loses nothing. If you still see
  # LOW USB BANDWIDTH, drop resolution next (HD720 -> VGA) or move a camera to its own USB3
  # controller. ZED HD720 supports 15/30/60 fps.
  # Hand (wrist) camera — used for perception
  hand:
    serial: "14846828"
    type: zed
    resolution: HD720
    fps: 15

  # External (side) camera — optional, for recording / viz only
  external:
    serial: "32439448"
    type: zed
    resolution: HD720
    fps: 15

  # Second external camera — recorded as DROID exterior_2. Only required when uncommented:
  # tiptop aborts at startup if a configured camera can't open, so no rollout is collected
  # missing a camera. For a deliberate 2-camera setup, just leave this commented out.
  # external_2:
  #   serial: "31425515"
  #   type: zed
  #   resolution: HD720
  #   fps: 15

perception:
  foundation_stereo:
    # PATCHED: we skip FoundationStereo and read ZED HW depth in zed_infer_depth_async
    # This URL is unused but kept for config compatibility.
    url: "http://localhost:1234"

  m2t2:
    # Port overridable per process via env (TIPTOP_M2T2_PORT) so multi-instance runs can each point
    # at their own M2T2 server; defaults to 8123 (single-instance / full_eval). See datagen launcher.
    url: "http://localhost:${oc.env:TIPTOP_M2T2_PORT,8123}"
    apply_bounds: true

  sam:
    mode: "local"

  depth_trunc_m: 5.0
  voxel_downsample_size: 0.0075
  contact_threshold_m: 0.01
  mask_erosion_pixels: 3
